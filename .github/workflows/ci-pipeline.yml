name: CI Pipeline

on:
  push:
    branches: [ main, "feat/*" ]
  pull_request:
    branches: [ main ]

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v2
      with:
        python-version: '3.12'
        architecture: 'x64'
        dependency-path: '**/requirements.txt'
    - run: make install
    - run: make -B test
